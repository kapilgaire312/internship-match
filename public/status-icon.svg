<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#4B5563" stroke-width="5"/>
  <!-- Dot above i -->
  <circle cx="50" cy="27" r="5" fill="#4B5563"/>

  <!-- Clip to hide the hook above y=42 so it doesn't spill into dot area -->
  <defs>
    <clipPath id="stemClip">
      <rect x="0" y="42" width="100" height="58"/>
    </clipPath>
    <clipPath id="hookClip">
      <rect x="0" y="34" width="100" height="16"/>
    </clipPath>
  </defs>

  <!-- Vertical stem + bottom foot, clipped to start at y=42 -->
  <line x1="50" y1="42" x2="50" y2="71" stroke="#4B5563" stroke-width="8" stroke-linecap="round"/>
  <line x1="43" y1="71" x2="57" y2="71" stroke="#4B5563" stroke-width="8" stroke-linecap="round"/>

  <!-- Top hook only, clipped to its region -->
  <path d="M44,42 Q44,36 49,36 Q56,36 56,43"
        fill="none" stroke="#4B5563" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"
        clip-path="url(#hookClip)"/>
</svg>